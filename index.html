<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="map"></div>

  <header class="topbar">
    <div class="brand-block">
      <div class="eyebrow">Interactive Monitor</div>
      <h1>Regional Incident Dashboard</h1>
      <p>Map, incident feed, filters, and daily activity</p>
    </div>

    <div class="top-stats">
      <div class="top-stat">
        <span>Total</span>
        <strong id="totalIncidents">0</strong>
      </div>
      <div class="top-stat">
        <span>Countries</span>
        <strong id="countryCount">0</strong>
      </div>
      <div class="top-stat">
        <span>Types</span>
        <strong id="typeCount">0</strong>
      </div>
    </div>
  </header>

  <section class="left-panel">
    <div class="panel-card">
      <h2>Filters</h2>

      <input id="search" placeholder="Search incidents" />

      <select id="countryFilter">
        <option value="all">All countries</option>
      </select>

      <select id="typeFilter">
        <option value="all">All types</option>
      </select>
    </div>

    <div class="panel-card incident-feed-card">
      <div class="panel-head">
        <h2>Latest Incidents</h2>
        <span id="resultCount">0</span>
      </div>
      <div id="incidentList" class="incident-list"></div>
    </div>
  </section>

  <section class="right-panel">
    <div class="panel-card chart-card">
      <div class="panel-head">
        <h2>Daily Activity</h2>
      </div>
      <canvas id="timelineChart"></canvas>
    </div>

    <div class="panel-card legend-card">
      <div class="panel-head">
        <h2>Legend</h2>
      </div>
      <div class="legend-items">
        <div class="legend-item"><span class="dot drone"></span> Drone</div>
        <div class="legend-item"><span class="dot missile"></span> Missile</div>
        <div class="legend-item"><span class="dot air"></span> Air activity</div>
        <div class="legend-item"><span class="dot default"></span> Other</div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
